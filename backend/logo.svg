<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 96" width="340" height="96" role="img" aria-label="AppSec Radar">
  <defs>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFE600" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFE600" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- full black banner: renders on any surface -->
  <rect x="0" y="0" width="340" height="96" rx="16" fill="#141414"/>

  <!-- radar scope -->
  <g transform="translate(50 48)" fill="none" stroke="#FFE600" stroke-linecap="round">
    <circle r="32" stroke-width="3"/>
    <circle r="21" stroke-width="1.4" opacity="0.45"/>
    <circle r="11" stroke-width="1.4" opacity="0.45"/>
    <line x1="-32" y1="0" x2="32" y2="0" stroke-width="1.2" opacity="0.30"/>
    <line x1="0" y1="-32" x2="0" y2="32" stroke-width="1.2" opacity="0.30"/>

    <!-- rotating sweep wedge + leading edge -->
    <path d="M0 0 L0 -31 A31 31 0 0 1 26.8 -15.5 Z" fill="url(#sweep)" stroke="none">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </path>
    <line x1="0" y1="0" x2="0" y2="-31" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </line>

    <!-- target blips -->
    <circle cx="14" cy="-18" r="3.2" fill="#FFE600" stroke="none"/>
    <circle cx="-17" cy="11" r="2.2" fill="#FFE600" stroke="none" opacity="0.7"/>
  </g>

  <!-- wordmark -->
  <text x="100" y="50" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif"
        font-size="29" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#FFFFFF">AppSec</tspan><tspan fill="#FFE600"> Radar</tspan>
  </text>
  <text x="101" y="70" font-family="ui-monospace,Menlo,Consolas,monospace"
        font-size="10" letter-spacing="3.2" fill="#9A9C96">APPSEC INTELLIGENCE</text>
</svg>
